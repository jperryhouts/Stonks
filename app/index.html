<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; script-src 'self'; style-src 'self' 'sha256-6ZeVojpIEHRFC4Rwwl4418UmEumrFjgLT6LOPg/q6n8='; img-src 'self'; media-src 'none'; connect-src 'self';">
    <title>Stonks</title>
    <style>body{visibility:hidden}</style>
    <link rel="stylesheet" href="style.css">
</head>
<body class="loading">
    <nav id="tabs">
        <button class="tab active" data-tab="chart" id="tab-chart-btn">Overview</button>
        <button class="tab" data-tab="tools">Allocation</button>
        <button class="tab" data-tab="gains">Performance</button>
        <button class="tab" data-tab="table">History</button>
        <button class="tab" data-tab="settings">Settings</button>
    </nav>
    <div id="banner" class="banner hidden" role="alert" aria-live="polite">
      <ul id="banner-list"></ul>
      <button id="banner-dismiss" class="banner-dismiss" aria-label="Dismiss">×</button>
    </div>
    <main id="app">
        <section id="panel-chart" class="panel">
            <div id="chart-wrap">
                <canvas id="chart"></canvas>
                <div class="skeleton skeleton-chart" aria-hidden="true"></div>
                <div id="loading-spinner" aria-hidden="true"></div>
                <select id="time-window">
                    <option value="1M">1 Month</option>
                    <option value="90D">90 Days</option>
                    <option value="YTD">YTD</option>
                    <option value="PREV_YEAR" id="prev-year-option">Prev Year</option>
                    <option value="1Y">1 Year</option>
                    <option value="2Y" selected>2 Years</option>
                    <option value="All">All</option>
                </select>
            </div>
            <div class="skeleton skeleton-detail" aria-hidden="true">
                <div class="skeleton-bar skeleton-bar--short"></div>
                <div class="skeleton-bar"></div>
                <div class="skeleton-bar"></div>
                <div class="skeleton-bar"></div>
                <div class="skeleton-bar"></div>
                <div class="skeleton-bar"></div>
                <div class="skeleton-bar"></div>
                <div class="skeleton-bar"></div>
                <div class="skeleton-bar"></div>
                <div class="skeleton-bar"></div>
                <div class="skeleton-bar skeleton-bar--medium"></div>
            </div>
            <div id="detail" class="detail hidden">
                <div class="detail-header">
                    <h2 id="detail-date"></h2>
                    <button id="detail-expand" class="detail-expand-btn" title="Show/hide shares &amp; price">Details</button>
                </div>
                <div class="detail-table-scroll">
                <table id="detail-table">
                    <thead>
                        <tr>
                            <th>Asset</th>
                            <th class="col-shares">Shares</th>
                            <th class="col-price">Price</th>
                            <th>Value</th>
                            <th>1D Change</th>
                            <th class="col-win-chg">Win Chg</th>
                        </tr>
                    </thead>
                    <tbody id="detail-body"></tbody>
                    <tfoot>
                        <tr>
                            <td>Total</td>
                            <td class="col-shares"></td>
                            <td class="col-price"></td>
                            <td id="detail-total"></td>
                            <td id="detail-change"></td>
                            <td id="detail-win-chg" class="col-win-chg"></td>
                        </tr>
                    </tfoot>
                </table>
                </div>
            </div>
            <span id="detail-fetched"></span>
        </section>
        <section id="panel-tools" class="panel hidden"></section>
        <section id="panel-gains" class="panel hidden"></section>
        <section id="panel-table" class="panel hidden"></section>
        <section id="panel-settings" class="panel hidden"></section>
    </main>
    <script src="js/config.js" defer></script>
    <script src="js/fmt.js" defer></script>
    <script src="js/data.js" defer></script>
    <script src="js/retirement.js" defer></script>
    <script src="js/assets.js" defer></script>
    <script src="js/gains.js" defer></script>
    <script src="js/returns.js" defer></script>
    <script src="js/validate.js" defer></script>
    <script src="js/ui-utils.js" defer></script>
    <script src="js/tools.js" defer></script>
    <script src="js/settings.js" defer></script>
    <script src="js/app.js" defer></script>
</body>
</html>
