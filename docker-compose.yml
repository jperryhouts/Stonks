services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ${DATA_DIR:-./data}:/opt/portfolio/data
    environment:
      - AUTH_PASS=${AUTH_PASS:-}
      - DATA_DIR=/opt/portfolio/data
    restart: unless-stopped

  fetcher:
    build:
      context: .
      dockerfile: docker/fetcher.Dockerfile
    volumes:
      - ${DATA_DIR:-./data}:/opt/portfolio/data
    restart: unless-stopped
